# ApplicationSet with RollingSync strategy for health-gated sequential deployment.
#
# This is the CORRECT pattern for bootstrapping dependent components in order.
# Each step waits for ALL Applications in that step to reach "Healthy" before
# the controller proceeds to the next step.
#
# How it works:
#   1. List generator creates 4 Applications, each with a bootstrap-group label
#   2. RollingSync steps match those labels in strict order
#   3. maxUpdate: "1" ensures only one App syncs at a time within each step
#   4. Controller waits for "Healthy" before advancing to the next step
#
# Key behaviors from ArgoCD docs:
#   - RollingSync DISABLES autosync on generated Applications
#   - Controller triggers sync operations when it's that step's turn
#   - Sync windows are still respected
#   - Retry settings from the template are preserved per-Application
#   - If an app stays unhealthy, the rollout stalls (no cascade failure)
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: bootstrap-demo
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - "missingkey=error"
  generators:
    - list:
        elements:
          - name: bootstrap-00-lvi
            path: apps/00-lvi
            group: "00-lvi"
            
          - name: bootstrap-01-intents
            path: apps/01-intents
            group: "01-intents"
            
          - name: bootstrap-02-rbac
            path: apps/02-rbac
            group: "02-rbac"
            
          - name: bootstrap-03-service
            path: apps/03-service
            group: "03-service"
            
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: bootstrap-group
              operator: In
              values:
                - "00-lvi"
          maxUpdate: "1"
        - matchExpressions:
            - key: bootstrap-group
              operator: In
              values:
                - "01-intents"
          maxUpdate: "1"
        - matchExpressions:
            - key: bootstrap-group
              operator: In
              values:
                - "02-rbac"
          maxUpdate: "1"
        - matchExpressions:
            - key: bootstrap-group
              operator: In
              values:
                - "03-service"
          maxUpdate: "1"
  template:
    metadata:
      name: "{{ .name }}"
      labels:
        bootstrap-group: "{{ .group }}"
        app.kubernetes.io/part-of: bootstrap-demo
    spec:
      project: default
      source:
        repoURL: https://github.com/HolyBitsLLC/argocd-bootstrap-demo.git
        targetRevision: HEAD
        path: "{{ .path }}"
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
